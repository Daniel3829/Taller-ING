{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <title>Inicio de sesión | TecNómina</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

	<link rel="shortcut icon" href="{% static 'images/logo_pestana.png' %}">
	<link rel="stylesheet" type="text/css" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'fonts/font-awesome-4.7.0/css/font-awesome.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'vendor/animate/animate.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'vendor/css-hamburgers/hamburgers.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'vendor/select2/select2.min.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/util.css' %}">
    <link rel="stylesheet" type="text/css" href="{% static 'css/login.css' %}">

</head>
<body>

<div class="limiter">
    <div class="container-login100">
        <div class="wrap-login100">
            <div class="login100-pic js-tilt" data-tilt>
                <img src="{% static 'images/TecNomina2.png' %}" alt="IMG">
            </div>

            <form id="formLogin" class="login100-form validate-form">
                {% csrf_token %}
                <span class="login100-form-title">Inicio de Sesión</span>

                <div class="wrap-input100 validate-input">
                    <input class="input100" type="text" name="correo" placeholder="Correo" required>
                    <span class="focus-input100"></span>
                    <span class="symbol-input100">
                        <i class="fa fa-envelope" aria-hidden="true"></i>
                    </span>
                </div>

                <div class="wrap-input100 validate-input">
                    <input class="input100" type="password" name="contraseña" placeholder="Contraseña" required>
                    <span class="focus-input100"></span>
                    <span class="symbol-input100">
                        <i class="fa fa-lock" aria-hidden="true"></i>
                    </span>
                </div>

                <div class="container-login100-form-btn">
                    <button class="login100-form-btn" type="submit">
                        Iniciar sesión
                    </button>
                </div>

				<div class="text-center p-t-20">
					<a class="txt2" href="{% url 'recuperar' %}">
						¿Olvidaste tu contraseña? <i class="fa fa-long-arrow-right m-l-5"></i>
					</a>
				</div>

				<div class="text-center p-t-116">
					<a class="txt2" href="{% url 'registrar' %}">
						Registrarte <i class="fa fa-long-arrow-right m-l-5"></i>
					</a>
				</div>

                <div id="loginError" style="color:red; margin-top:10px;"></div>
            </form>
        </div>
    </div>
</div>

<script>
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                cookie = cookie.trim();
                if (cookie.startsWith(name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();

        const correo = e.target.correo.value;
        const contraseña = e.target.contraseña.value;

        const res = await fetch('/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ correo, contraseña })
        });

        const data = await res.json();

        if (res.ok) {
            window.location.href = '/inicio/';
        } else {
            document.getElementById('loginError').innerText = data.error || 'Error al iniciar sesión';
        }
    });
</script>

<script src="{% static 'vendor/jquery/jquery-3.2.1.min.js' %}"></script>
<script src="{% static 'vendor/bootstrap/js/popper.js' %}"></script>
<script src="{% static 'vendor/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'vendor/select2/select2.min.js' %}"></script>
<script src="{% static 'vendor/tilt/tilt.jquery.min.js' %}"></script>
<script>
    $('.js-tilt').tilt({ scale: 1.1 });
</script>
<script src="{% static 'js/main.js' %}"></script>

</body>
</html>
